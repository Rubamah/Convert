<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SRT Translator Pro</title>

<style>
body {
    font-family: Arial;
    padding: 20px;
    background: #f4f4f4;
}
textarea {
    width: 100%;
    height: 180px;
    margin-bottom: 10px;
}
select, button {
    padding: 10px;
    margin: 5px 0;
}
progress {
    width: 100%;
    height: 20px;
}
#status {
    font-weight: bold;
}
</style>

</head>
<body>

<h2>SRT Translator</h2>

<input type="file" id="fileInput" accept=".srt"><br><br>

<label>From:</label>
<select id="sourceLang">
    <option value="auto">Auto</option>
    <option value="hi">Hindi</option>
    <option value="ar">Arabic</option>
    <option value="en">English</option>
</select>

<label>To:</label>
<select id="targetLang">
    <option value="en">English</option>
    <option value="ar">Arabic</option>
    <option value="hi">Hindi</option>
</select>

<textarea id="inputText" placeholder="Paste SRT text here..."></textarea>

<br>
<button onclick="translateSRT()">Translate</button>
<button onclick="downloadSRT()">Download SRT</button>

<p id="status"></p>
<progress id="progressBar" value="0" max="100"></progress>

<textarea id="outputText" placeholder="Translated output..."></textarea>

<script>
let translatedText = "";

// تحميل الملف
document.getElementById('fileInput').addEventListener('change', function(e) {
    const reader = new FileReader();
    reader.onload = function(e) {
        document.getElementById('inputText').value = e.target.result;
    };
    reader.readAsText(e.target.files[0]);
});

// ترجمة دفعات (أسرع)
async function translateBatch(lines) {
    const source = document.getElementById("sourceLang").value;
    const target = document.getElementById("targetLang").value;

    const text = lines.join("\n");

    const res = await fetch("https://translate.argosopentech.com/translate", {
        method: "POST",
        body: JSON.stringify({
            q: text,
            source: source,
            target: target,
            format: "text"
        }),
        headers: { "Content-Type": "application/json" }
    });

    const data = await res.json();
    return data.translatedText.split("\n");
}

// الترجمة
async function translateSRT() {
    const input = document.getElementById('inputText').value;
    const lines = input.split("\n");

    let textLines = [];
    let mapIndex = [];

    // فصل النصوص فقط
    lines.forEach((line, i) => {
        if (
            line.trim() !== "" &&
            !line.match(/^\d+$/) &&
            !line.includes("-->")
        ) {
            mapIndex.push(i);
            textLines.push(line);
        }
    });

    document.getElementById("status").innerText = "⏳ جاري الترجمة...";
    document.getElementById("progressBar").value = 20;

    try {
        let translated = await translateBatch(textLines);

        document.getElementById("progressBar").value = 80;

        // إعادة الدمج
        mapIndex.forEach((index, i) => {
            lines[index] = translated[i] || lines[index];
        });

        translatedText = lines.join("\n");
        document.getElementById('outputText').value = translatedText;

        document.getElementById("progressBar").value = 100;
        document.getElementById("status").innerText = "✅ تمت الترجمة!";
    } catch (err) {
        document.getElementById("status").innerText = "❌ فشل الترجمة (API أو إنترنت)";
        console.error(err);
    }
}

// تحميل الملف
function downloadSRT() {
    const blob = new Blob([translatedText], { type: "text/plain" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "translated.srt";
    link.click();
}
</script>

</body>
</html>

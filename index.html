<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>SRT Translator</title>
<style>
body { font-family: Arial; padding: 20px; background: #f4f4f4; }
textarea { width: 100%; height: 200px; margin-bottom: 10px; }
select, button { padding: 10px; margin: 5px 0; }
</style>
</head>
<body>

<h2>SRT Translator</h2>

<input type="file" id="fileInput" accept=".srt"><br><br>

<label>From:</label>
<select id="sourceLang">
  <option value="auto">Auto</option>
  <option value="hi">Hindi</option>
  <option value="ar">Arabic</option>
  <option value="en">English</option>
</select>

<label>To:</label>
<select id="targetLang">
  <option value="en">English</option>
  <option value="ar">Arabic</option>
  <option value="hi">Hindi</option>
</select>

<textarea id="inputText" placeholder="Paste SRT text here..."></textarea>

<br>
<button onclick="translateSRT()">Translate</button>
<button onclick="downloadSRT()">Download SRT</button>

<textarea id="outputText" placeholder="Translated output..."></textarea>

<script>
let translatedText = "";

// Load file
document.getElementById('fileInput').addEventListener('change', function(e) {
    const reader = new FileReader();
    reader.onload = function(e) {
        document.getElementById('inputText').value = e.target.result;
    };
    reader.readAsText(e.target.files[0]);
});

// Real translation (LibreTranslate)
async function translateText(text) {
    const source = document.getElementById("sourceLang").value;
    const target = document.getElementById("targetLang").value;

    const res = await fetch("https://libretranslate.de/translate", {
        method: "POST",
        body: JSON.stringify({
            q: text,
            source: source,
            target: target,
            format: "text"
        }),
        headers: { "Content-Type": "application/json" }
    });

    const data = await res.json();
    return data.translatedText;
}

// Translate SRT
async function translateSRT() {
    const input = document.getElementById('inputText').value;
    const lines = input.split("\n");

    let result = [];

    for (let line of lines) {
        if (
            line.trim() === "" ||
            line.match(/^\d+$/) || 
            line.includes("-->")
        ) {
            result.push(line);
        } else {
            let translated = await translateText(line);
            result.push(translated);
        }
    }

    translatedText = result.join("\n");
    document.getElementById('outputText').value = translatedText;
}

// Download
function downloadSRT() {
    const blob = new Blob([translatedText], { type: "text/plain" });
    const link = document.createElement("a");
    link.href = URL.createObjectURL(blob);
    link.download = "translated.srt";
    link.click();
}
</script>

</body>
</html>
